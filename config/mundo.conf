# MUNDO Agent Configuration
# 蒙多帝国配置文件

[agent]
name = MUNDO
version = 2.2.0
title = THE EMPEROR

[llm]
default_provider = xiaomi
default_model = mimo-v2.5-pro
timeout = 120
max_tokens = 4096

[context]
max_tokens = 128000
compress_threshold = 0.7
keep_recent = 8

[tools]
enabled = terminal,read_file,write_file,edit_file,search_files,web_search,list_directory,git_operation,python_execute
timeout = 30

[memory]
enabled = true
db_path = ~/.hermes/mundo-agent/memory.db
max_facts = 100

[delegation]
enabled = true
max_concurrent = 3

[display]
theme = gold
stream = true
