# MUNDO Agent Configuration
# 蒙多的帝国配置

agent:
  name: "MUNDO"
  version: "24.0.0"
  title: "THE EMPEROR"
  personality: "mundo-emperor"

# 模型配置 — 蒙多调度天下AI
models:
  default:
    provider: "xiaomi"
    model: "mimo-v2.5-pro"
  emperor:
    provider: "anthropic"
    model: "claude-sonnet-4"
  fast:
    provider: "deepseek"
    model: "deepseek-chat"
  reasoning:
    provider: "openrouter"
    model: "anthropic/claude-opus-4"

# 记忆系统 — 蒙多永不遗忘
memory:
  enabled: true
  backend: "sqlite"
  path: "~/.hermes/mundo-agent/memory.db"
  profile_path: "~/.hermes/mundo-agent/memory/profile"
  conversation_path: "~/.hermes/mundo-agent/memory/conversations"
  max_profile_facts: 100
  max_conversation_summaries: 20

# 技能系统 — 蒙多的武器库
skills:
  auto_load: true
  scan_paths:
    - "~/.hermes/skills/"
  ranking_enabled: true
  auto_save_new: true

# 任务系统 — 蒙多分身术
delegation:
  enabled: true
  max_concurrent: 3
  max_depth: 1

# 工具系统 — 蒙多的一切武器
tools:
  enabled:
    - terminal
    - file
    - web
    - code_execution
    - vision
    - video
    - skills
    - memory
    - delegation
    - session_search
    - cronjob
    - clarify
    - todo

# UI 配置 — 蒙多的宫殿
ui:
  theme: "emperor-dark"
  prompt_symbol: "👑 "
  thinking_indicator: "⚔️ 蒙多思考中..."
  success_indicator: "✅ 蒙多已征服"
  error_indicator: "❌ 蒙多记住了这个失败"
